services:
  n8n:
    image: docker.n8n.io/n8nio/n8n:latest
    container_name: ai_stack_n8n
    restart: unless-stopped
    environment:
      # Database Connection
      DB_TYPE: postgresdb
      DB_POSTGRESDB_DATABASE: ${N8N_DB_NAME:-n8n}
      DB_POSTGRESDB_HOST: ${HOST_IP} 
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_USER: ${POSTGRES_USER}
      DB_POSTGRESDB_PASSWORD: ${POSTGRES_PASSWORD}
      
      # Core Settings
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}
      GENERIC_TIMEZONE: ${TIMEZONE:-Etc/UTC}
      WEBHOOK_URL: ${N8N_WEBHOOK_URL:-http://localhost:5678}
    ports:
      - "5678:5678"
    volumes:
      - /opt/app_data/n8n_data:/home/node/.n8n
    deploy:
      resources:
        limits:
          memory: 2G

  opencode:
    image: lscr.io/linuxserver/code-server:latest
    container_name: ai_stack_opencode
    restart: unless-stopped
    environment:
      PUID: 1000
      PGID: 1000
      TZ: ${TIMEZONE:-Etc/UTC}
      PASSWORD: ${OPENCODE_PASSWORD}
      SUDO_PASSWORD: ${OPENCODE_SUDO_PASSWORD}
      DEFAULT_WORKSPACE: /workspace/opt 
    ports:
      - "8443:8443"
    volumes:
      - /opt/app_data/opencode_config:/config
      - /opt/stacks:/workspace/opt  # Changed from /opt to /opt/stacks
    deploy:
      resources:
        limits:
          memory: 1.5G