services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: data_stack_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_memory}
    volumes:
      - /opt/app_data/postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    deploy:
      resources:
        limits:
          memory: 4G
        reservations:
          memory: 100M

  postgres-backup:
    image: prodrigestivill/postgres-backup-local:latest
    container_name: data_stack_pg_backup
    restart: unless-stopped
    depends_on:
      - postgres
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-ai_memory}
      SCHEDULE: "@every 6h"
      BACKUP_KEEP_DAYS: 2
      BACKUP_KEEP_WEEKS: 13
    volumes:
      - /opt/app_data/postgres_backups:/backups
    deploy:
      resources:
        limits:
          memory: 200M
        reservations:
          memory: 10M